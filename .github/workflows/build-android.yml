name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps for Buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-21-jdk \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('android/buildozer.spec') }}

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK
        working-directory: ./android
        run: |
          buildozer android debug || \
            (echo "First attempt failed, retrying..." && buildozer android debug)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WarraichPetroleum-Android
          path: android/bin/*.apk

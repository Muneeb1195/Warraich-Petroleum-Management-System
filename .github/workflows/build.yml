name: Build Warraich Petroleum

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xinput0 \
            libegl1 \
            libegl1-mesa \
            libgl1 \
            libxrender1 \
            libxi6 \
            libxtst6 \
            libfontconfig1 \
            libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 reportlab openpyxl pyinstaller pydrive2

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --add-data "settings.ini:." \
            --add-data "resources:resources" \
            --add-data "client_secrets.json:." \
            --name "WarraichPetroleum" main.py

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: WarraichPetroleum-Linux
          path: dist/WarraichPetroleum

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: WarraichPetroleum-Windows
          path: dist/WarraichPetroleum.exe

  create-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            WarraichPetroleum-Linux/WarraichPetroleum
            WarraichPetroleum-Windows/WarraichPetroleum.exe
          generate_release_notes: true
